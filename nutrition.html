<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koit Nutrition Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --navy:#1a3c5e; --navy-d:#0f2540; --navy-m:#1e4976;
  --teal:#00695c; --teal-m:#00897b; --teal-lg:#e0f2f1; --teal-gw:rgba(0,137,123,0.13);
  --cream:#faf9f6; --cream-d:#f0ede6; --cream-dd:#e8e3d8;
  --white:#ffffff; --text:#1a2e42; --muted:#7a8694; --border:#dde3ec;
  --gold:#c8920a; --gold-lg:#fef9ed;
  --green:#2e7d32; --green-lg:#e8f5e9; --green-gw:rgba(46,125,50,0.13);
  --orange:#e65100; --red:#c62828;
  --shadow:0 2px 16px rgba(26,60,94,0.08);
  --shadow-lg:0 8px 40px rgba(26,60,94,0.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;}
body{
  background:var(--cream);font-family:'DM Sans',sans-serif;
  color:var(--text);min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 0% 0%,rgba(0,105,92,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%,rgba(26,60,94,0.05) 0%,transparent 60%);
}

/* ── LAYOUT ── */
.app{max-width:680px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 0 40px;}

/* ── INTAKE FORM ── */
#intakeScreen{flex:1;display:flex;flex-direction:column;}

/* progress bar */
.prog-wrap{padding:20px 24px 0;flex-shrink:0;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{font-size:11.5px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.prog-count{font-size:11.5px;color:var(--teal-m);font-weight:700;}
.prog-bar{height:3px;background:var(--cream-dd);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal-m),var(--navy-m));border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* question card */
.q-stage{flex:1;display:flex;align-items:flex-start;padding:24px 24px 0;overflow-y:auto;}
.q-card{width:100%;animation:qIn .32s cubic-bezier(.4,0,.2,1);}
@keyframes qIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.q-step-ic{font-size:32px;margin-bottom:12px;}
.q-title{font-family:'Fraunces',serif;font-size:clamp(20px,4vw,26px);font-weight:500;color:var(--navy-d);line-height:1.3;margin-bottom:6px;}
.q-sub{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:22px;}

/* option buttons */
.opts{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:20px;}
.opt{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:12px;padding:11px 18px;
  font-size:13.5px;font-weight:500;color:var(--text);
  cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;gap:8px;
}
.opt:hover{border-color:var(--teal-m);color:var(--teal-m);background:var(--teal-lg);}
.opt.selected{background:var(--teal-lg);border-color:var(--teal-m);color:var(--teal);}
.opt.selected::after{content:'✓';margin-left:4px;font-weight:700;}
.opt-multi{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:11px 18px;font-size:13.5px;font-weight:500;color:var(--text);cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px;}
.opt-multi:hover{border-color:var(--teal-m);}
.opt-multi.sel{background:var(--teal-lg);border-color:var(--teal-m);color:var(--teal);}
.opt-multi.sel::after{content:'✓';margin-left:4px;font-weight:700;}

/* text inputs */
.q-input{
  width:100%;background:var(--white);border:1.5px solid var(--border);
  border-radius:12px;padding:13px 16px;font-size:14px;
  font-family:'DM Sans',sans-serif;color:var(--text);
  resize:none;line-height:1.6;transition:border-color .2s;
  min-height:48px;max-height:120px;
}
.q-input:focus{outline:none;border-color:var(--teal-m);box-shadow:0 0 0 3px var(--teal-gw);}
.q-input::placeholder{color:var(--muted);}

/* number input */
.num-wrap{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.num-btn{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--navy);transition:all .18s;font-family:'DM Sans',sans-serif;}
.num-btn:hover{border-color:var(--teal-m);color:var(--teal-m);}
.num-val{font-family:'Fraunces',serif;font-size:32px;font-weight:500;color:var(--navy-d);min-width:60px;text-align:center;}
.num-unit{font-size:13px;color:var(--muted);font-weight:500;}

/* nav buttons */
.q-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 24px 20px;flex-shrink:0;gap:10px;}
.btn-back{background:transparent;border:1.5px solid var(--border);border-radius:11px;padding:11px 20px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-back:hover{border-color:var(--navy);color:var(--navy);}
.btn-next{
  background:linear-gradient(135deg,var(--navy-d),var(--navy-m));
  border:none;border-radius:11px;padding:11px 28px;
  font-size:13.5px;font-weight:700;color:white;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;box-shadow:0 4px 14px rgba(26,60,94,0.22);
  display:flex;align-items:center;gap:7px;
}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 7px 20px rgba(26,60,94,0.28);}
.btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* medication add row */
.med-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.med-item{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.med-item-name{font-weight:600;color:var(--navy);}
.med-item-detail{font-size:11.5px;color:var(--muted);margin-top:1px;}
.med-rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:2px 6px;}
.med-add-row{display:grid;grid-template-columns:1fr 80px 80px auto;gap:7px;margin-bottom:10px;}
.med-inp{background:var(--white);border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);width:100%;}
.med-inp:focus{outline:none;border-color:var(--teal-m);}
.med-inp::placeholder{color:var(--muted);}
.btn-add-med{background:var(--teal-lg);border:1.5px solid var(--teal-m);color:var(--teal);border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}

/* ── GENERATING SCREEN ── */
#genScreen{display:none;flex:1;align-items:center;justify-content:center;flex-direction:column;padding:40px 24px;text-align:center;}
.gen-ring{width:64px;height:64px;border-radius:50%;border:3px solid var(--cream-dd);border-top-color:var(--teal-m);animation:spin 1s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-title{font-family:'Fraunces',serif;font-size:22px;font-weight:500;color:var(--navy-d);margin-bottom:8px;}
.gen-sub{font-size:13.5px;color:var(--muted);line-height:1.6;}
.gen-steps{margin-top:20px;display:flex;flex-direction:column;gap:8px;text-align:left;max-width:280px;}
.gen-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);transition:color .3s;}
.gen-step.done{color:var(--teal-m);}
.gen-step-ic{width:20px;text-align:center;font-size:14px;}

/* ── PLAN SCREEN ── */
#planScreen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.plan-top{
  background:linear-gradient(135deg,var(--navy-d),var(--teal));
  padding:20px 24px;flex-shrink:0;
}
.plan-top-title{font-family:'Fraunces',serif;font-size:18px;font-weight:500;color:white;margin-bottom:3px;}
.plan-top-sub{font-size:12px;color:rgba(255,255,255,0.55);}
.plan-top-btns{display:flex;gap:8px;margin-top:14px;}
.btn-pdf{background:white;color:var(--navy-d);border:none;border-radius:9px;padding:9px 18px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-pdf:hover{background:var(--cream);transform:translateY(-1px);}
.btn-restart{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);border-radius:9px;padding:9px 16px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-restart:hover{background:rgba(255,255,255,0.2);color:white;}

.plan-body{flex:1;overflow-y:auto;padding:20px 24px;background:var(--cream);}
.plan-body::-webkit-scrollbar{width:3px;}
.plan-body::-webkit-scrollbar-thumb{background:var(--cream-dd);border-radius:3px;}

/* plan content rendered */
.plan-content{background:var(--white);border-radius:14px;padding:20px;border:1.5px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;line-height:1.75;font-size:13.5px;color:var(--text);}
.plan-content h2{font-family:'Fraunces',serif;font-size:18px;font-weight:500;color:var(--navy-d);margin:16px 0 8px;border-bottom:1.5px solid var(--cream-d);padding-bottom:8px;}
.plan-content h2:first-child{margin-top:0;}
.plan-content h3{font-family:'Fraunces',serif;font-size:15px;color:var(--teal);margin:12px 0 6px;}
.plan-content ul{padding-left:18px;margin:6px 0;}
.plan-content li{margin-bottom:4px;}
.plan-content strong{color:var(--navy);}
.plan-content .meal-row{display:flex;gap:12px;background:var(--cream);border-radius:9px;padding:10px 12px;margin-bottom:7px;align-items:flex-start;}
.plan-content .meal-time{font-weight:700;font-size:12px;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;min-width:80px;padding-top:1px;}
.plan-content .meal-food{font-size:13px;color:var(--text);line-height:1.5;}
.macro-row{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap;}
.macro-pill{background:var(--teal-lg);border:1.5px solid rgba(0,137,123,0.2);border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:700;color:var(--teal);display:flex;align-items:center;gap:5px;}

/* supplement ask card */
.supp-ask{background:var(--gold-lg);border:1.5px solid #f0d080;border-radius:14px;padding:18px;margin-bottom:16px;}
.supp-ask-title{font-family:'Fraunces',serif;font-size:16px;font-weight:500;color:var(--navy-d);margin-bottom:6px;}
.supp-ask-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px;}
.supp-ask-btns{display:flex;gap:9px;}
.btn-yes{background:linear-gradient(135deg,var(--teal),var(--teal-m));color:white;border:none;border-radius:9px;padding:10px 22px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-yes:hover{transform:translateY(-1px);box-shadow:0 5px 14px var(--teal-gw);}
.btn-no{background:white;color:var(--muted);border:1.5px solid var(--border);border-radius:9px;padding:10px 18px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-no:hover{border-color:var(--navy);color:var(--navy);}

/* product cards */
.prod-card{background:var(--green-lg);border:1.5px solid #a5d6a7;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;gap:12px;}
.p-em{font-size:24px;flex-shrink:0;}
.p-name{font-weight:700;font-size:13.5px;color:var(--green);margin-bottom:2px;}
.p-cat{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;}
.p-desc{font-size:13px;color:#444;line-height:1.5;margin-bottom:9px;}
.p-btns{display:flex;gap:7px;flex-wrap:wrap;}
.b-buy{background:linear-gradient(135deg,var(--green),#43a047);color:white;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-block;transition:all .18s;}
.b-buy:hover{transform:translateY(-1px);}
.b-enq{background:white;color:var(--navy);border:1.5px solid var(--navy);border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;}
.b-enq:hover{background:var(--navy);color:white;}

.supp-section-title{font-family:'Fraunces',serif;font-size:17px;color:var(--navy-d);margin-bottom:12px;}
.supp-decline{background:var(--cream-d);border-radius:12px;padding:14px 18px;font-size:13.5px;color:var(--muted);text-align:center;line-height:1.6;}

/* disclaimer */
.disclaimer{background:#fff8e1;border:1.5px solid #ffe082;border-radius:10px;padding:10px 14px;font-size:11.5px;color:#5d4037;display:flex;gap:7px;line-height:1.5;margin-bottom:16px;}

@media(max-width:520px){
  .med-add-row{grid-template-columns:1fr 1fr;}.med-add-row .btn-add-med{grid-column:1/-1;}
  .macro-row{gap:7px;}
}
</style>
</head>

</div>

</div><!-- /app -->

let step = 0;

// ═══════════════════════════════════════
// RENDER QUESTION
// ═══════════════════════════════════════
function renderQ(idx) {
  const q = QUESTIONS[idx];
  const pct = Math.round(((idx + 1) / QUESTIONS.length) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progCount').textContent = `${idx + 1} of ${QUESTIONS.length}`;
  document.getElementById('btnBack').style.visibility = idx === 0 ? 'hidden' : 'visible';

  let html = `<div class="q-card">
    <div class="q-step-ic">${q.ic}</div>
    <div class="q-title">${q.title}</div>
    <div class="q-sub">${q.sub}</div>`;

  if (q.type === 'single') {
    html += `<div class="opts" id="opts">`;
    q.opts.forEach((o, i) => {
      const sel = answers[q.id] === o.label ? ' selected' : '';
      html += `<button class="opt${sel}" onclick="selectSingle('${q.id}',this,'${o.label}')">${o.em} ${o.label}</button>`;
    });
    html += `</div>`;
  }

  if (q.type === 'multi' || q.type === 'multi_other') {
    html += `<div class="opts" id="opts">`;
    const cur = answers[q.id] || [];
    q.opts.forEach(o => {
      const sel = cur.includes(o.label) ? ' sel' : '';
      html += `<button class="opt-multi${sel}" onclick="toggleMulti('${q.id}',this,'${o.label}')">${o.em} ${o.label}</button>`;
    });
    html += `</div>`;
    if (q.type === 'multi_other') {
      const otherVal = answers[q.id + '_other'] || '';
      html += `<textarea class="q-input" id="other_${q.id}" placeholder="✏️ Other — type here if not listed above…" style="margin-top:8px;" oninput="answers['${q.id}_other']=this.value" rows="2">${otherVal}</textarea>`;
    }
  }

  if (q.type === 'number') {
    const val = answers[q.id] || q.default;
    html += `<div class="num-wrap">
      <button class="num-btn" onclick="adj('${q.id}',${q.min},${q.max},-1)">−</button>
      <div class="num-val" id="numVal_${q.id}">${val}</div>
      <div class="num-unit">${q.unit}</div>
      <button class="num-btn" onclick="adj('${q.id}',${q.min},${q.max},1)">+</button>
    </div>`;
    if (!answers[q.id]) answers[q.id] = q.default;
  }

  if (q.type === 'text') {
    const val = answers[q.id] || '';
    html += `<textarea class="q-input" id="txt_${q.id}" placeholder="${q.placeholder}" oninput="answers['${q.id}']=this.value" rows="3">${val}</textarea>`;
  }

  if (q.type === 'meds') {
    html += `<div class="med-list" id="medList">${renderMedList()}</div>
    <div class="med-add-row">
      <input class="med-inp" id="medName" placeholder="${q.placeholder}">
      <input class="med-inp" id="medDose" placeholder="Dose (mg)">
      <input class="med-inp" id="medFreq" placeholder="Frequency">
      <button class="btn-add-med" onclick="addMed()">+ Add</button>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:4px;">Or type "none" below if not taking any:</p>
    <textarea class="q-input" id="txt_medications" placeholder="None / No medications" style="margin-top:8px;" oninput="answers['medications_note']=this.value" rows="2">${answers['medications_note']||''}</textarea>`;
  }

  html += `</div>`;
  document.getElementById('qStage').innerHTML = html;
}

function renderMedList() {
  if (meds.length === 0) return '';
  return meds.map((m, i) =>
    `<div class="med-item">
      <div><div class="med-item-name">${m.name}</div><div class="med-item-detail">${m.dose} · ${m.freq}</div></div>
      <button class="med-rm" onclick="removeMed(${i})">✕</button>
    </div>`
  ).join('');
}

function addMed() {
  const name = document.getElementById('medName').value.trim();
  const dose = document.getElementById('medDose').value.trim();
  const freq = document.getElementById('medFreq').value.trim();
  if (!name) return;
  meds.push({ name, dose: dose || '—', freq: freq || '—' });
  document.getElementById('medName').value = '';
  document.getElementById('medDose').value = '';
  document.getElementById('medFreq').value = '';
  document.getElementById('medList').innerHTML = renderMedList();
}

function removeMed(i) { meds.splice(i, 1); document.getElementById('medList').innerHTML = renderMedList(); }

function selectSingle(qid, el, val) {
  document.querySelectorAll('#opts .opt').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  answers[qid] = val;
  // auto-advance after brief delay so user sees selection
  setTimeout(() => goNext(), 420);
}

function toggleMulti(qid, el, val) {
  if (!answers[qid]) answers[qid] = [];
  // if 'None' selected, clear others
  if (val.includes('None')) { answers[qid] = [val]; document.querySelectorAll('#opts .opt-multi').forEach(b=>b.classList.remove('sel')); el.classList.add('sel'); return; }
  // remove None if selecting something else
  answers[qid] = answers[qid].filter(v => !v.includes('None'));
  document.querySelectorAll('#opts .opt-multi').forEach(b => { if(b.textContent.includes('None')) b.classList.remove('sel'); });
  if (el.classList.contains('sel')) { el.classList.remove('sel'); answers[qid] = answers[qid].filter(v => v !== val); }
  else { el.classList.add('sel'); answers[qid].push(val); }
}

function adj(qid, min, max, delta) {
  let v = (answers[qid] || 30) + delta;
  v = Math.max(min, Math.min(max, v));
  answers[qid] = v;
  document.getElementById('numVal_' + qid).textContent = v;
}

function goBack() { if (step > 0) { step--; renderQ(step); } }

function goNext() {
  const q = QUESTIONS[step];
  // basic validation
  if (q.type === 'single' && !answers[q.id]) { shake(); return; }
  if ((q.type === 'multi' || q.type === 'multi_other') && (!answers[q.id] || answers[q.id].length === 0) && !answers[q.id+'_other']) { shake(); return; }

  if (step < QUESTIONS.length - 1) {
    step++;
    renderQ(step);
  } else {
    generatePlan();
  }
}

function shake() {
  const card = document.querySelector('.q-card');
  card.style.animation = 'none';
  card.style.transform = 'translateX(-8px)';
  setTimeout(() => { card.style.transform = 'translateX(8px)'; }, 80);
  setTimeout(() => { card.style.transform = 'translateX(0)'; card.style.animation = ''; }, 160);
}

function buildProfile() {
  const medList = meds.length > 0
    ? meds.map(m => `${m.name} ${m.dose} ${m.freq}`).join(', ')
    : answers['medications_note'] || 'None';

  const conditionsOther = answers['conditions_other'] ? `, ${answers['conditions_other']}` : '';
  const goalOther = answers['goal_other'] ? `, ${answers['goal_other']}` : '';
  return `PATIENT PROFILE:
- Gender: ${answers['gender'] || 'Not specified'}
- Age: ${answers['age'] || 'Not specified'} years
- Health Conditions: ${(answers['conditions'] || ['None']).join(', ')}${conditionsOther}
- Primary Goals: ${(answers['goal'] || ['General wellness']).join ? (answers['goal']||['General wellness']).join(', ') : answers['goal'] || 'General wellness'}${goalOther}
- Dietary Preference: ${answers['diet'] || 'No restrictions'}
- Activity Level: ${answers['exercise'] || 'Sedentary'}
- Lifestyle Factors: ${(answers['lifestyle'] || ['None']).join(', ')}
- Allergies/Intolerances: ${answers['allergies'] || 'None'}
- Current Medications: ${medList}
- Additional Notes: ${answers['extra'] || 'None'}`;
}

function renderPlanHTML(text) {
  let html = text
    .replace(/## (.*)/g, '<h2>$1</h2>')
    .replace(/### (.*)/g, '<h3>$1</h3>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^- (.*)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>[\n]?)+/g, m => '<ul>' + m + '</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

// PDF DOWNLOAD

function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const pw = doc.internal.pageSize.getWidth();
  const ph = doc.internal.pageSize.getHeight();
  const margin = 18;
  const usable = pw - margin * 2;
  let y = 0;

  function addPage() {
    doc.addPage();
    y = margin;
    // subtle header on each page
    doc.setFillColor(15, 37, 64);
    doc.rect(0, 0, pw, 10, 'F');
    doc.setFontSize(8); doc.setTextColor(255,255,255);
    doc.text('Koit Biopharma — Personalised Nutrition Plan', margin, 7);
    doc.text('koitbiopharma.com', pw - margin, 7, { align: 'right' });
    y = 18;
  }

  function checkY(needed) { if (y + needed > ph - 20) { addPage(); } }

  // Cover header
  doc.setFillColor(15, 37, 64);
  doc.rect(0, 0, pw, 44, 'F');
  doc.setFontSize(22); doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.text('Personalised Nutrition Plan', margin, 20);
  doc.setFontSize(11); doc.setFont('helvetica', 'normal');
  doc.setTextColor(160, 210, 200);
  doc.text(`${Array.isArray(answers['goal']) ? answers['goal'].join(', ') : (answers['goal']||'General Wellness')} · ${answers['diet']||''} · ${answers['age']||''} years`, margin, 30);
  doc.setFontSize(9); doc.setTextColor(120, 160, 150);
  doc.text(`Generated by Koit Biopharma Health Advisor · ${new Date().toLocaleDateString()}`, margin, 38);

  // Teal accent line
  doc.setFillColor(0, 137, 123);
  doc.rect(0, 44, pw, 2, 'F');

  y = 54;

  // Profile summary box
  doc.setFillColor(240, 249, 248);
  doc.setDrawColor(0, 137, 123);
  doc.setLineWidth(0.4);
  doc.roundedRect(margin, y, usable, 28, 3, 3, 'FD');
  doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor(0, 105, 92);
  doc.text('YOUR PROFILE', margin + 5, y + 7);
  doc.setFont('helvetica', 'normal'); doc.setTextColor(40, 60, 80);
  const profileLine = `${answers['gender'] || ''} · Age ${answers['age'] || ''} · ${(answers['conditions']||['Healthy']).join(', ')} · Goal: ${answers['goal'] || ''}`;
  const wrapped = doc.splitTextToSize(profileLine, usable - 10);
  doc.text(wrapped, margin + 5, y + 14);
  y += 36;

  // Disclaimer
  doc.setFillColor(255, 249, 225);
  doc.setDrawColor(240, 200, 80);
  doc.roundedRect(margin, y, usable, 12, 2, 2, 'FD');
  doc.setFontSize(8); doc.setFont('helvetica', 'italic'); doc.setTextColor(100, 70, 30);
  doc.text('⚠ This plan is for general guidance only. Consult your doctor before making significant dietary or medication changes.', margin + 4, y + 8);
  y += 20;

  // Plan content
  const lines = planText.split('\n');
  lines.forEach(line => {
    if (!line.trim()) { y += 3; return; }

    if (line.startsWith('## ')) {
      checkY(14);
      y += 4;
      doc.setFillColor(15, 37, 64);
      doc.rect(margin, y - 1, 3, 8, 'F');
      doc.setFontSize(13); doc.setFont('helvetica', 'bold'); doc.setTextColor(15, 37, 64);
      doc.text(line.replace('## ',''), margin + 7, y + 6);
      y += 12;
      doc.setDrawColor(200, 210, 220);
      doc.setLineWidth(0.3);
      doc.line(margin, y, pw - margin, y);
      y += 5;
    } else if (line.startsWith('### ')) {
      checkY(10);
      doc.setFontSize(11); doc.setFont('helvetica', 'bold'); doc.setTextColor(0, 105, 92);
      doc.text(line.replace('### ',''), margin, y + 6);
      y += 10;
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      const txt = line.replace(/^[-*] /,'');
      const clean = txt.replace(/\*\*(.*?)\*\*/g,'$1');
      checkY(8);
      doc.setFontSize(9.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(50, 70, 90);
      doc.setFillColor(0, 137, 123);
      doc.circle(margin + 2, y + 3.5, 1.2, 'F');
      const wrapped2 = doc.splitTextToSize(clean, usable - 8);
      doc.text(wrapped2, margin + 7, y + 5);
      y += wrapped2.length * 5.5 + 1;
    } else if (line.startsWith('**') && line.endsWith('**')) {
      checkY(8);
      doc.setFontSize(10); doc.setFont('helvetica', 'bold'); doc.setTextColor(26, 60, 94);
      doc.text(line.replace(/\*\*/g,''), margin, y + 5);
      y += 8;
    } else {
      const clean = line.replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1');
      if (!clean.trim()) return;
      checkY(7);
      doc.setFontSize(9.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(50, 70, 90);
      const wrapped3 = doc.splitTextToSize(clean, usable);
      doc.text(wrapped3, margin, y + 5);
      y += wrapped3.length * 5.5 + 1;
    }
  });

  // Footer on last page
  checkY(20);
  y += 8;
  doc.setFillColor(15, 37, 64);
  doc.rect(0, ph - 18, pw, 18, 'F');
  doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(160, 180, 200);
  doc.text('Koit Biopharma Private Limited · koitbiopharma.com · Health Advisor', margin, ph - 9);
  doc.text(`Generated: ${new Date().toLocaleDateString()}`, pw - margin, ph - 9, { align: 'right' });

  doc.save(`Koit-Nutrition-Plan-${new Date().toLocaleDateString('en-GB').replace(/\//g,'-')}.pdf`);
}

// ═══════════════════════════════════════
// RESTART
// ═══════════════════════════════════════
function restart() {
  step = 0; answers = {}; meds = []; planText = ''; planHTML = '';
  document.getElementById('planScreen').style.display = 'none';
  document.getElementById('genScreen').style.display = 'none';
  const is = document.getElementById('intakeScreen');
  is.style.display = 'flex';
  // reset gen steps
  ['gs1','gs2','gs3','gs4'].forEach(s => {
    document.getElementById(s).classList.remove('done');
    document.getElementById(s).querySelector('.gen-step-ic').textContent = '⏳';
  });
  renderQ(0);
}

// init
renderQ(0);
</script>
